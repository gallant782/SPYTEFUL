# =============================================================================
# MindFrame — Production Docker Compose (n8n Automation Server)
# =============================================================================

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: mindframe-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?ERROR}
      N8N_METRICS: ${N8N_METRICS:-false}
      N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN: "true"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"
      N8N_PAYLOAD_SIZE_MAX: "16"
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: ${N8N_DB_HOST:-n8n-db}
      DB_POSTGRESDB_PORT: ${N8N_DB_PORT:-5432}
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?ERROR}
      DB_POSTGRESDB_SCHEMA: ${N8N_DB_SCHEMA:-public}
      EXECUTIONS_MODE: ${N8N_EXECUTIONS_MODE:-regular}
      QUEUE_BULL_REDIS_HOST: ${REDIS_HOST:-n8n-redis}
      QUEUE_BULL_REDIS_PORT: ${REDIS_PORT:-6379}
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      QUEUE_BULL_REDIS_DB: ${REDIS_DB:-0}
      MINDFRAME_SUPABASE_URL: ${MINDFRAME_SUPABASE_URL:?ERROR}
      MINDFRAME_SUPABASE_SERVICE_KEY: ${MINDFRAME_SUPABASE_SERVICE_KEY:?ERROR}
      MINDFRAME_OPENAI_API_KEY: ${MINDFRAME_OPENAI_API_KEY:?ERROR}
      MINDFRAME_ELEVENLABS_API_KEY: ${MINDFRAME_ELEVENLABS_API_KEY:-}
      MINDFRAME_STRIPE_SECRET_KEY: ${MINDFRAME_STRIPE_SECRET_KEY:-}
      MINDFRAME_STRIPE_WEBHOOK_SECRET: ${MINDFRAME_STRIPE_WEBHOOK_SECRET:-}
      MINDFRAME_GUMROAD_ACCESS_TOKEN: ${MINDFRAME_GUMROAD_ACCESS_TOKEN:-}
      MINDFRAME_BEEHIIV_API_KEY: ${MINDFRAME_BEEHIIV_API_KEY:-}
      MINDFRAME_CONVERTKIT_API_KEY: ${MINDFRAME_CONVERTKIT_API_KEY:-}
      MINDFRAME_SMTP_HOST: ${MINDFRAME_SMTP_HOST:-}
      MINDFRAME_SMTP_PORT: ${MINDFRAME_SMTP_PORT:-587}
      MINDFRAME_SMTP_USER: ${MINDFRAME_SMTP_USER:-}
      MINDFRAME_SMTP_PASS: ${MINDFRAME_SMTP_PASS:-}
      MINDFRAME_SMTP_FROM: ${MINDFRAME_SMTP_FROM:-noreply@mindframe.ai}
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=1", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      n8n-db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mindframe-net

  n8n-db:
    image: postgres:15-alpine
    container_name: mindframe-n8n-db
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:?ERROR}
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n} -d ${N8N_DB_NAME:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - mindframe-net

volumes:
  n8n_data:
    name: mindframe-n8n-data
  n8n_db_data:
    name: mindframe-n8n-db-data

networks:
  mindframe-net:
    name: mindframe-network
    driver: bridge
