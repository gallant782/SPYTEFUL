# =============================================================================
# MindFrame — Production Docker Compose (n8n Automation Server)
# =============================================================================
# Version: 1.0.0
#
# Deploys: n8n (automation) + PostgreSQL (n8n state) + Redis (n8n queue)
#
# Prerequisites:
#   1. docker compose file exists in deploy/
#   2. ./deploy/env-template.sh sourced (or deployed.env present)
#   3. Ports 5678, 5432, 6379 available
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up -d
#   docker compose -f deploy/docker-compose.yml logs -f n8n
#   docker compose -f deploy/docker-compose.yml down
#
# Healthcheck URL: http://localhost:5678/healthz
# =============================================================================

services:
  # ===========================================================================
  # n8n — Automation & Workflow Engine
  # ===========================================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: mindframe-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      # --- General n8n Configuration ---
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?ERROR: N8N_ENCRYPTION_KEY is required}
      - N8N_METRICS=${N8N_METRICS:-false}
      - N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN=true
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - N8N_PAYLOAD_SIZE_MAX=16

      # --- PostgreSQL Connection (n8n internal state) ---
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${N8N_DB_HOST:-n8n-db}
      - DB_POSTGRESDB_PORT=${N8N_DB_PORT:-5432}
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME:-n8n}
      - DB_POSTGRESDB_USER=${N8N_DB_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:?ERROR: N8N_DB_PASSWORD is required}
      - DB_POSTGRESDB_SCHEMA=${N8N_DB_SCHEMA:-public}

      # --- Redis Queue Configuration (optional, for scaling) ---
      - EXECUTIONS_MODE=${N8N_EXECUTIONS_MODE:-regular}
      - QUEUE_BULL_REDIS_HOST=${REDIS_HOST:-n8n-redis}
      - QUEUE_BULL_REDIS_PORT=${REDIS_PORT:-6379}
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - QUEUE_BULL_REDIS_DB=${REDIS_DB:-0}

      # --- MindFrame Credentials & API Keys ---
      # Supabase (business database)
      - MINDFRAME_SUPABASE_URL=${MINDFRAME_SUPABASE_URL:?ERROR: MINDFRAME_SUPABASE_URL is required}
      - MINDFRAME_SUPABASE_SERVICE_KEY=${MINDFRAME_SUPABASE_SERVICE_KEY:?ERROR: MINDFRAME_SUPABASE_SERVICE_KEY is required}

      # AI Providers
      - MINDFRAME_OPENAI_API_KEY=${MINDFRAME_OPENAI_API_KEY:?ERROR: MINDFRAME_OPENAI_API_KEY is required}
      - MINDFRAME_ELEVENLABS_API_KEY=${MINDFRAME_ELEVENLABS_API_KEY:-}

      # Payment Processors
      - MINDFRAME_STRIPE_SECRET_KEY=${MINDFRAME_STRIPE_SECRET_KEY:-}
      - MINDFRAME_STRIPE_WEBHOOK_SECRET=${MINDFRAME_STRIPE_WEBHOOK_SECRET:-}
      - MINDFRAME_GUMROAD_ACCESS_TOKEN=${MINDFRAME_GUMROAD_ACCESS_TOKEN:-}

      # Email Marketing
      - MINDFRAME_BEEHIIV_API_KEY=${MINDFRAME_BEEHIIV_API_KEY:-}
      - MINDFRAME_CONVERTKIT_API_KEY=${MINDFRAME_CONVERTKIT_API_KEY:-}

      # SMTP (fallback email sender)
      - MINDFRAME_SMTP_HOST=${MINDFRAME_SMTP_HOST:-}
      - MINDFRAME_SMTP_PORT=${MINDFRAME_SMTP_PORT:-587}
      - MINDFRAME_SMTP_USER=${MINDFRAME_SMTP_USER:-}
      - MINDFRAME_SMTP_PASS=${MINDFRAME_SMTP_PASS:-}
      - MINDFRAME_SMTP_FROM=${MINDFRAME_SMTP_FROM:-noreply@mindframe.ai}

      # n8n Campaign IDs (set via n8n UI after import)
      # MINDFRAME_WELCOME_DAY1_CAMPAIGN_ID, etc.

    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/import
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=1", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      n8n-db:
        condition: service_healthy
      n8n-redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mindframe-net

  # ===========================================================================
  # PostgreSQL — n8n Internal State Database
  # ===========================================================================
  n8n-db:
    image: postgres:15-alpine
    container_name: mindframe-n8n-db
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=${N8N_DB_NAME:-n8n}
      - POSTGRES_USER=${N8N_DB_USER:-n8n}
      - POSTGRES_PASSWORD=${N8N_DB_PASSWORD:?ERROR: N8N_DB_PASSWORD is required}
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n} -d ${N8N_DB_NAME:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - mindframe-net

  # ===========================================================================
  # Redis — Queue Backend (Optional: only needed for EXECUTIONS_MODE=queue)
  # ===========================================================================
  n8n-redis:
    image: redis:7-alpine
    container_name: mindframe-n8n-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      sh -c '
        if [ -n "$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$REDIS_PASSWORD"
        else
          redis-server
        fi
      '
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - mindframe-net

volumes:
  n8n_data:
    name: mindframe-n8n-data
  n8n_db_data:
    name: mindframe-n8n-db-data
  n8n_redis_data:
    name: mindframe-n8n-redis-data

networks:
  mindframe-net:
    name: mindframe-network
    driver: bridge