# =============================================================================
# MindFrame — Production Infrastructure (Docker Compose)
# =============================================================================
# Deploys: n8n (automation) + PostgreSQL (n8n state) + Redis (n8n queue)
#
# Compatible with Docker Compose v2.40+ (map syntax for environment vars).
#
# Usage:
#   docker compose up -d
#   docker compose logs -f n8n
#
# NOTE: Supabase is managed via supabase.com cloud — not included here.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # n8n — Automation Server
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: mindframe-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # --- General n8n Configuration ---
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Must set N8N_ENCRYPTION_KEY}
      N8N_METRICS: ${N8N_METRICS:-false}
      N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN: "true"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"

      # --- Database (PostgreSQL for n8n state) ---
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: ${N8N_DB_HOST:-n8n-db}
      DB_POSTGRESDB_PORT: ${N8N_DB_PORT:-5432}
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?Must set N8N_DB_PASSWORD}

      # --- Queue (Redis for scaling) ---
      EXECUTIONS_MODE: ${N8N_EXECUTIONS_MODE:-regular}
      QUEUE_BULL_REDIS_HOST: ${REDIS_HOST:-n8n-redis}
      QUEUE_BULL_REDIS_PORT: ${REDIS_PORT:-6379}
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # --- Supabase (Business Database) ---
      MINDFRAME_SUPABASE_URL: ${MINDFRAME_SUPABASE_URL:-}
      MINDFRAME_SUPABASE_SERVICE_KEY: ${MINDFRAME_SUPABASE_SERVICE_KEY:-}

      # --- AI Providers ---
      MINDFRAME_OPENAI_API_KEY: ${MINDFRAME_OPENAI_API_KEY:-}
      MINDFRAME_ELEVENLABS_API_KEY: ${MINDFRAME_ELEVENLABS_API_KEY:-}

      # --- Payment Processors ---
      MINDFRAME_STRIPE_SECRET_KEY: ${MINDFRAME_STRIPE_SECRET_KEY:-}
      MINDFRAME_STRIPE_WEBHOOK_SECRET: ${MINDFRAME_STRIPE_WEBHOOK_SECRET:-}
      MINDFRAME_GUMROAD_ACCESS_TOKEN: ${MINDFRAME_GUMROAD_ACCESS_TOKEN:-}

      # --- Email Marketing ---
      MINDFRAME_BEEHIIV_API_KEY: ${MINDFRAME_BEEHIIV_API_KEY:-}
      MINDFRAME_CONVERTKIT_API_KEY: ${MINDFRAME_CONVERTKIT_API_KEY:-}

      # --- SMTP Fallback ---
      MINDFRAME_SMTP_HOST: ${MINDFRAME_SMTP_HOST:-}
      MINDFRAME_SMTP_PORT: ${MINDFRAME_SMTP_PORT:-587}
      MINDFRAME_SMTP_USER: ${MINDFRAME_SMTP_USER:-}
      MINDFRAME_SMTP_PASS: ${MINDFRAME_SMTP_PASS:-}
      MINDFRAME_SMTP_FROM: ${MINDFRAME_SMTP_FROM:-noreply@mindframe.ai}

    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/backup:/backup
    depends_on:
      n8n-db:
        condition: service_healthy
      n8n-redis:
        condition: service_started
    networks:
      - mindframe-net

  # ---------------------------------------------------------------------------
  # PostgreSQL — n8n internal state database
  # ---------------------------------------------------------------------------
  n8n-db:
    image: postgres:15-alpine
    container_name: mindframe-n8n-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:?Must set N8N_DB_PASSWORD}
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n} -d ${N8N_DB_NAME:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindframe-net

  # ---------------------------------------------------------------------------
  # Redis — Queue for n8n (optional, only needed if EXECUTIONS_MODE=queue)
  # ---------------------------------------------------------------------------
  n8n-redis:
    image: redis:7-alpine
    container_name: mindframe-n8n-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server ${REDIS_REQUIREPASS:+--requirepass $REDIS_PASSWORD}
    volumes:
      - n8n_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - mindframe-net

volumes:
  n8n_data:
    name: mindframe-n8n-data
  n8n_db_data:
    name: mindframe-n8n-db-data
  n8n_redis_data:
    name: mindframe-n8n-redis-data

networks:
  mindframe-net:
    name: mindframe-network
    driver: bridge